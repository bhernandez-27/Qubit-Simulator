<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloch Sphere</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <style>
        body 
        {
            margin: 0;
            padding: 0;
        }
    </style>   
</head>
<body>
    <div id="ui-container" style=
    "
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        display: flex;
        flex-direction: row;
        padding: 0px;
        gap: 0px; /* automatic spacing between children — no manual top/left needed! */
    ">
        <div id="leftHandNavigation" style="background-color: gray; width: 20%; height: 100%;">
            <div>
                <h1 style = "color : white"> Plot a Qubit </h1>
            </div>
            <div id="plottingInput" style="z-index: 10; color: white; font-family: sans-serif">
                <input type="text" id="alphaInput" style="width: 80px; height : 40px;" placeholder="α"> <p style="display: inline-block; font-size: 200%;">|0⟩</p>
                <p style="display: inline-block; font-size: 200%;"> + </p>
                <input type="text" id="betaInput" style="width: 80px; height : 40px;" placeholder="β"> <p style="display: inline-block; font-size: 200%;">|1⟩</p>

                <br>
                <button id="plotButton" style="width: 150px; height : 50px;">Plot</button>

            </div>

            <p id="errorMessage"></p>


            <div id="ui-overlay" style="z-index: 5; color: white; font-family: sans-serif;">
                <div>Number of Segments</div>
                <input type="range" id="sphereSegmentsSlider" min="1" max="400" value="13">
                <span id="sphereSegmentsValue">13</span>
            </div>


            
            <script type="module" src="/src/main.ts"></script>
        </div>

        <div id="sceneContainer" style="position: relative; flex: 1;"></div>
    
    </div>

</body>
</html>
